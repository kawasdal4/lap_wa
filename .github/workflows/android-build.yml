name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Environment Debug
        run: |
          node -v
          npm -v
          npx cap --version || true

      - name: Dependency Installation
        run: |
          cd web
          rm -rf node_modules
          npm install

      - name: Build Web App
        env:
          DATABASE_URL: "file:./dummy.db"
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: "AIzaSy..."
        run: |
          cd web
          npm run build

      - name: Prepare Capacitor Web Assets
        run: |
          cd web
          mkdir -p android/app/src/main/assets/public
          echo "<html><body>App Loader</body></html>" > android/app/src/main/assets/public/index.html
 
      - name: Platform Verification & Sync
        run: |
          cd web
          npx cap sync android
          npx cap doctor

      - name: Build Release APK
        run: |
          cd web/android
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace --info

      - name: Debug APK Output
        run: |
          ls -R web/android/app/build/outputs

      - name: Collect APK
        run: |
          mkdir -p build-output
          cp web/android/app/build/outputs/apk/release/*.apk build-output/lap-wa-release.apk || \
          cp web/android/app/build/outputs/apk/debug/*.apk build-output/lap-wa-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lap-wa-android
          path: build-output/lap-wa-release.apk

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: |
          pip install awscli
          aws s3 cp build-output/lap-wa-release.apk s3://${R2_BUCKET}/mobile-builds/android/app-release.apk \
            --endpoint-url ${R2_ENDPOINT}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build-output/lap-wa-release.apk
          generate_release_notes: true
