name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
 
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
 
      - name: Install Dependencies
        run: |
          cd web
          npm install --ignore-scripts
 
      - name: Create Web Assets (Bootstrap)
        run: |
          mkdir -p web/out
          echo '<!DOCTYPE html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Laporan WA</title><style>body{background:#0b0f1a;display:flex;align-items:center;justify-content:center;height:100vh;margin:0;color:white;font-family:sans-serif;}</style></head><body><div style="text-align:center"><h2>Loading...</h2></div><script>window.location.href="https://lap-wa.vercel.app"</script></body></html>' > web/out/index.html
 
      - name: Debug - List Files
        run: |
          ls -la web/
          ls -la web/android/ || echo "Android folder missing"
          cat web/capacitor.config.ts
 
      - name: Sync Capacitor
        run: |
          cd web
          npx cap sync android --verbose
 
      - name: Build Release APK
        run: |
          cd web/android
          chmod +x gradlew
          ./gradlew assembleRelease
 
      - name: Rename APK
        run: |
          cp web/android/app/build/outputs/apk/release/app-release.apk lap-wa-release.apk
 
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lap-wa-android
          path: lap-wa-release.apk

      - name: Upload to R2
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        if: ${{ env.R2_ACCESS_KEY != '' }}
        run: |
          pip install awscli
          aws s3 cp lap-wa-release.apk s3://${R2_BUCKET}/mobile-builds/android/app-release.apk \
            --endpoint-url ${R2_ENDPOINT}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: lap-wa.apk
          generate_release_notes: true
