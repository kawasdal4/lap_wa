name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Environment Debug
        run: |
          node -v
          npm -v
          npx cap --version || true

      - name: Dependency Installation
        run: |
          cd web
          rm -rf node_modules
          npm install

      - name: Capacitor Sync
        run: |
          cd web
          mkdir -p out
          echo "<html><body>Loading Laporan WA...</body></html>" > out/index.html
          npx cap sync android
          # Remove persistent flatDir warnings randomly re-generated
          sed -i '/flatDir/,/}/d' android/app/build.gradle
          sed -i '/flatDir/,/}/d' android/capacitor-cordova-android-plugins/build.gradle

      - name: Build Android App
        run: |
          cd web/android
          chmod +x gradlew
          ./gradlew clean assembleDebug

      - name: Debug Output
        run: |
          ls -R web/android/app/build/outputs

      - name: Prepare App Binary
        run: |
          mkdir -p build-output
          find web/android/app/build/outputs/apk/debug -type f -name "*.apk" -exec cp {} build-output/lap-wa-debug.apk \;

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lap-wa-android
          path: build-output/lap-wa-debug.apk

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: |
          pip install awscli
          aws s3 cp build-output/lap-wa-debug.apk s3://${R2_BUCKET}/mobile-builds/android/app-debug.apk \
            --endpoint-url ${R2_ENDPOINT}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: build-output/lap-wa-debug.apk
          generate_release_notes: true
