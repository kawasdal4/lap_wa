name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: false
        default: 'release'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Environment Debug
        run: |
          node -v
          npm -v

      - name: Dependency Cleanup & Install
        run: |
          cd web
          rm -rf node_modules
          rm -f package-lock.json
          npm install
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap --version

      - name: Build Web App
        env:
          DATABASE_URL: "file:./dummy.db"
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: "AIzaSy..."
        run: |
          cd web
          npm run build

      - name: Platform Verification & Sync
        run: |
          cd web
          npx cap add android || echo "Android platform already exists"
          npx cap sync android
          npx cap doctor

      - name: Build Release APK
        run: |
          cd web/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Rename APK
        run: |
          cp web/android/app/build/outputs/apk/release/app-release.apk lap-wa-release.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lap-wa-android
          path: lap-wa-release.apk

      - name: Upload to R2
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        if: ${{ env.R2_ACCESS_KEY != '' }}
        run: |
          pip install awscli
          aws s3 cp lap-wa-release.apk s3://${R2_BUCKET}/mobile-builds/android/app-release.apk \
            --endpoint-url ${R2_ENDPOINT}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: lap-wa-release.apk
          generate_release_notes: true
