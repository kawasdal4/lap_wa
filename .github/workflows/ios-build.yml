name: Build iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Environment Debug
        run: |
          node -v
          npm -v
          npx cap --version || true

      - name: Dependency Installation
        run: |
          cd web
          rm -rf node_modules
          npm install

      - name: Build Web App
        env:
          DATABASE_URL: "file:./dummy.db"
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: "AIzaSy..."
        run: |
          cd web
          npm run build

      - name: Prepare Capacitor Web Assets
        run: |
          cd web
          mkdir -p ios/App/App/public
          echo "<html><body>App Loader</body></html>" > ios/App/App/public/index.html

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Capacitor Sync
        run: |
          cd web
          npx cap sync ios

      - name: Install CocoaPods
        run: |
          cd web/ios/App
          if [ -f "Podfile" ]; then
            pod install
          else
            echo "No Podfile found, skipping CocoaPods installation (assuming Swift Package Manager)"
          fi

      - name: Build iOS
        run: |
          cd web/ios/App
          if [ -d "App.xcworkspace" ]; then
            xcodebuild -workspace App.xcworkspace -scheme App -configuration Release -sdk iphoneos build CODE_SIGNING_ALLOWED=NO
          else
            xcodebuild -project App.xcodeproj -scheme App -configuration Release -sdk iphoneos build CODE_SIGNING_ALLOWED=NO
          fi

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        if: ${{ env.AWS_ACCESS_KEY_ID != '' }}
        run: |
          pip install awscli
          if [ -f "output/App.ipa" ]; then
            aws s3 cp output/App.ipa s3://${R2_BUCKET}/mobile-builds/ios/app-release.ipa --endpoint-url ${R2_ENDPOINT}
          else
            echo "IPA not found at output/App.ipa. Skipping upload. (Note: Distributable IPAs require Archiving and Code Signing)."
          fi
