name: Build iOS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Environment Debug
        run: |
          node -v
          npm -v
          npx cap --version || true

      - name: Dependency Installation
        run: |
          cd web
          rm -rf node_modules
          npm install

      - name: Build Web App
        env:
          DATABASE_URL: "file:./dummy.db"
          NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: "AIzaSy..."
        run: |
          cd web
          npm run build

      - name: Platform Verification & Sync
        run: |
          cd web
          npx cap add ios || echo "iOS platform already exists"
          npx cap sync ios
          npx cap doctor

      - name: Build iOS App
        run: |
          cd web/ios/App
          xcodebuild -workspace App.xcworkspace -scheme App -sdk iphoneos -configuration Release CODE_SIGNING_ALLOWED=NO

      - name: Prepare for R2
        run: |
          mkdir -p output
          cd web/ios/App
          zip -r ../../../output/app-release.ipa .

      - name: Upload to R2
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET_NAME }}
          R2_ENDPOINT: ${{ secrets.R2_ENDPOINT }}
        if: ${{ env.R2_ACCESS_KEY != '' }}
        run: |
          pip install awscli
          aws s3 cp output/app-release.ipa s3://${R2_BUCKET}/mobile-builds/ios/app-release.ipa \
            --endpoint-url ${R2_ENDPOINT}
