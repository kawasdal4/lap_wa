name: Build Mobile Apps

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android APK'
        required: true
        default: true
        type: boolean
      build_ios:
        description: 'Build iOS IPA'
        required: true
        default: false
        type: boolean

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-android:
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.build_android != 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/android
          npx cap init "Laporan WA" "id.go.basarnas.lapwa" --web-dir out
          npx cap add android
          npx cap sync android
          # Remove persistent flatDir warnings randomly re-generated
          sed -i '/flatDir/,/}/d' android/app/build.gradle
          sed -i '/flatDir/,/}/d' android/capacitor-cordova-android-plugins/build.gradle

      - name: Build APK
        working-directory: ./android
        run: ./gradlew clean assembleDebug

      - name: Rename APK
        run: mv android/app/build/outputs/apk/debug/app-debug.apk lap-wa-debug.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lap-wa-android
          path: lap-wa-debug.apk

      - name: Upload to R2 (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        env:
          R2_ACCESS_KEY: ${{ secrets.R2_ACCESS_KEY }}
          R2_SECRET_KEY: ${{ secrets.R2_SECRET_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          # Install rclone or awscli for R2 upload
          pip install awscli
          aws s3 cp lap-wa-debug.apk s3://${R2_BUCKET}/lap-wa-debug.apk \
            --endpoint-url https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com \
            --acl public-read

  build-ios:
    runs-on: macos-latest
    if: ${{ github.event.inputs.build_ios == 'true' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build Next.js
        run: npm run build

      - name: Install Capacitor
        run: |
          npm install @capacitor/core @capacitor/cli @capacitor/ios
          npx cap init "Laporan WA" "id.go.basarnas.lapwa" --web-dir out
          npx cap add ios
          npx cap sync ios

      - name: Build iOS (no code signing)
        working-directory: ./ios/App
        run: |
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -sdk iphoneos \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r ios/App/build/App.xcarchive/Products/Applications/App.app Payload/
          zip -r lap-wa.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: lap-wa-ios
          path: lap-wa.ipa

  create-release:
    needs: [build-android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: lap-wa-android

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: lap-wa-debug.apk
          generate_release_notes: true
